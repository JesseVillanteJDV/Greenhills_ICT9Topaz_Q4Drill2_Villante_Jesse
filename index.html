<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4 Drill 2</title>
    <style>
        body {
            background-image: url(https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcS0ZoQH8HFv0TEJ8zYcncmygSbdJ13UovsFYQ&s);
            background-repeat: no-repeat;
            background-size: cover;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            background: rgb(214, 146, 43);
            padding: 20px;
            border-radius: 10px;
            margin: 0 auto;
        }
    </style>
</head>
<body>
    
<div class="container">
    <h1 class="text-center" style="color:rgb(88, 62, 22)">Heat index checker</h1>

    <h2 class="mt-3" style="color:rgb(88, 62, 22)">Input</h2>
<div class="mb-3">
        <label  style="color:rgb(88, 62, 22)">Temperature (Celsius)</label>
        <input type="number" id="temp" class="form-control">
    </div>
    <div class="mb-3">
        <label style="color:rgb(88, 62, 22)">Humidity (%)</label>
        <input type="number" id="humidity" class="form-control">
    </div>
    <button class="btn btn-primary w-100" onclick="calculateHeatIndex()">Calculate</button>
    <h2 class="mt-4" style="color:rgb(88, 62, 22)">Result</h2>
    <p id="result"></p>

    <p class="mt-3">
        Source:
        <a href="https://www.w3schools.com/">w3schools helped me</a>
    </p>
</div>
<script src="main.js"></script>
</body>
</html>
